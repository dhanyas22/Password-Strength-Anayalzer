<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Analyzer</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f6fc;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    width:420px;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#333;
}

input{
    width:100%;
    padding:10px;
    margin-top:15px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    margin-top:10px;
    padding:8px 15px;
    cursor:pointer;
    border:none;
    background:#007BFF;
    color:white;
    border-radius:5px;
}

button:hover{
    background:#0056b3;
}

.progress{
    width:100%;
    height:15px;
    background:#ddd;
    border-radius:20px;
    margin-top:20px;
}

.bar{
    height:100%;
    width:0%;
    border-radius:20px;
    transition:0.5s;
}

#strength{
    margin-top:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

ul{
    margin-top:20px;
    padding-left:20px;
}

li{
    margin:8px 0;
    font-size:16px;
}

.valid{
    color:green;
    font-weight:bold;
}

.invalid{
    color:red;
}
</style>

</head>
<body>

<div class="container">

<h2>Password Strength Analyzer</h2>

<input type="password"
id="password"
maxlength="16"
placeholder="Enter Password (Maximum 16 Characters)"
onkeyup="checkPassword()">

<button onclick="togglePassword()">Show / Hide Password</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="strength"></div>

<ul>
<li id="length" class="invalid">✖ 8 to 16 Characters</li>
<li id="upper" class="invalid">✖ At least One Uppercase Letter</li>
<li id="lower" class="invalid">✖ At least One Lowercase Letter</li>
<li id="number" class="invalid">✖ At least One Number</li>
<li id="special" class="invalid">✖ At least One Special Character</li>
</ul>

</div>

<script>

function togglePassword(){

var pass=document.getElementById("password");

if(pass.type==="password")
pass.type="text";
else
pass.type="password";

}

function checkPassword(){

var password=document.getElementById("password").value;

var score=0;

if(password.length>=8 && password.length<=16){
score++;
valid("length");
}
else{
invalid("length");
}

if(/[A-Z]/.test(password)){
score++;
valid("upper");
}
else{
invalid("upper");
}

if(/[a-z]/.test(password)){
score++;
valid("lower");
}
else{
invalid("lower");
}

if(/[0-9]/.test(password)){
score++;
valid("number");
}
else{
invalid("number");
}

if(/[^A-Za-z0-9]/.test(password)){
score++;
valid("special");
}
else{
invalid("special");
}

var bar=document.getElementById("bar");
var strength=document.getElementById("strength");

if(password.length==0){

bar.style.width="0%";
strength.innerHTML="";
return;

}

if(score<=2){

bar.style.width="35%";
bar.style.background="red";
strength.innerHTML="Weak Password";
strength.style.color="red";

}

else if(score<=4){

bar.style.width="70%";
bar.style.background="orange";
strength.innerHTML="Medium Password";
strength.style.color="orange";

}

else{

bar.style.width="100%";
bar.style.background="green";
strength.innerHTML="Strong Password";
strength.style.color="green";

}

}

function valid(id){

var item=document.getElementById(id);

item.className="valid";

if(id=="length")
item.innerHTML="✔ 8 to 16 Characters";

if(id=="upper")
item.innerHTML="✔ At least One Uppercase Letter";

if(id=="lower")
item.innerHTML="✔ At least One Lowercase Letter";

if(id=="number")
item.innerHTML="✔ At least One Number";

if(id=="special")
item.innerHTML="✔ At least One Special Character";

}

function invalid(id){

var item=document.getElementById(id);

item.className="invalid";

if(id=="length")
item.innerHTML="✖ 8 to 16 Characters";

if(id=="upper")
item.innerHTML="✖ At least One Uppercase Letter";

if(id=="lower")
item.innerHTML="✖ At least One Lowercase Letter";

if(id=="number")
item.innerHTML="✖ At least One Number";

if(id=="special")
item.innerHTML="✖ At least One Special Character";

}

</script>

</body>
</html>
